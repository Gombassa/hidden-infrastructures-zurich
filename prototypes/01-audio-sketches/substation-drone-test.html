<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPd Test - Substation Drone</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d4ff; }
        h3 { color: #aaa; margin-top: 24px; }
        .controls {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .control-group {
            margin: 16px 0;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .control-group:last-child { border-bottom: none; }
        button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { background: #00a8cc; }
        button:disabled { background: #555; cursor: not-allowed; }
        label {
            display: block;
            margin: 8px 0 5px;
            font-size: 14px;
        }
        input[type="range"] {
            width: 100%;
            margin: 4px 0;
        }
        .value {
            color: #00d4ff;
            font-weight: bold;
        }
        .hint {
            color: #666;
            font-size: 12px;
            margin-top: 2px;
        }
        #console {
            background: #0f0f23;
            border: 1px solid #333;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            border-radius: 4px;
        }
        .log { color: #aaa; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
        .warn { color: #ffd43b; }
        #status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .status-loading { background: #ffd43b22; border: 1px solid #ffd43b; }
        .status-ready { background: #51cf6622; border: 1px solid #51cf66; }
        .status-error { background: #ff6b6b22; border: 1px solid #ff6b6b; }
    </style>
</head>
<body>
    <h1>WebPd Test: Substation Drone</h1>
    <p>50 Hz electrical hum with harmonics and tram-modulated pulsing</p>

    <div id="status" class="status-loading">Loading WebPd runtime...</div>

    <div class="controls">
        <button id="initBtn" disabled>Initialize Audio</button>

        <div class="control-group">
            <label>Base Frequency Control: <span id="freqValue" class="value">0.50</span></label>
            <input type="range" id="freqSlider" min="0" max="1" value="0.5" step="0.01">
            <div class="hint">vsl 0-1 range, modulates base frequency (~50 Hz center)</div>
        </div>

        <div class="control-group">
            <label>Trams Nearby: <span id="tramValue" class="value">0</span></label>
            <input type="range" id="tramSlider" min="0" max="5" value="0" step="1">
            <div class="hint">Number of trams drawing power (0-5), adds pulsing modulation</div>
        </div>
    </div>

    <h3>Console Output</h3>
    <div id="console"></div>

    <!-- WebPd runtime (shared, generated by webpd CLI) -->
    <script src="substation-drone-app/webpd-runtime.js"></script>
    <script>
        // Console logging helper
        const consoleDiv = document.getElementById('console');
        function log(msg, type = 'log') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console[type === 'error' ? 'error' : type === 'warn' ? 'warn' : 'log'](msg);
        }

        const statusDiv = document.getElementById('status');
        const initBtn = document.getElementById('initBtn');
        const freqSlider = document.getElementById('freqSlider');
        const freqValue = document.getElementById('freqValue');
        const tramSlider = document.getElementById('tramSlider');
        const tramValue = document.getElementById('tramValue');

        let webpdNode = null;
        let audioContext = null;

        // Check that WebPdRuntime loaded
        if (typeof WebPdRuntime !== 'undefined') {
            log('WebPdRuntime loaded', 'success');
            initBtn.disabled = false;
            statusDiv.textContent = 'Click "Initialize Audio" to start';
            statusDiv.className = 'status-ready';
        } else {
            log('WebPdRuntime failed to load', 'error');
            statusDiv.textContent = 'WebPd runtime failed to load';
            statusDiv.className = 'status-error';
        }

        // Send message to a Pd node
        // Compiled patch node IDs:
        //   n_0_29 = vsl (Freq Control, 0-1)
        //   n_0_32 = floatatom (Trams Nearby, 0-5)
        //   n_0_4  = s base-freq
        //   n_0_45 = s tram-count
        function sendMsg(nodeId, portletId, message) {
            if (!webpdNode) return;
            webpdNode.port.postMessage({
                type: 'io:messageReceiver',
                payload: { nodeId, portletId, message },
            });
        }

        // Initialize audio
        initBtn.addEventListener('click', async () => {
            try {
                log('Creating AudioContext...');
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                log(`AudioContext: ${audioContext.sampleRate}Hz`, 'success');

                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                    log('AudioContext resumed', 'success');
                }

                log('Registering WebPd worklet...');
                await WebPdRuntime.initialize(audioContext);
                log('Worklet registered', 'success');

                log('Fetching compiled patch (patch.wasm)...');
                const response = await fetch('./substation-drone-app/patch.wasm');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const patch = await response.arrayBuffer();
                log(`Patch loaded (${patch.byteLength} bytes)`, 'success');

                log('Starting WebPd...');
                webpdNode = await WebPdRuntime.run(
                    audioContext,
                    patch,
                    WebPdRuntime.defaultSettingsForRun(
                        './substation-drone-app/patch.wasm',
                        (nodeId, portletId, message) => {
                            log(`Pd -> JS: ${nodeId}:${portletId} = ${JSON.stringify(message)}`);
                        },
                    ),
                );
                webpdNode.connect(audioContext.destination);

                log('Substation drone running!', 'success');
                initBtn.disabled = true;
                statusDiv.textContent = 'Drone active - adjust controls below';
                statusDiv.className = 'status-ready';

                // Set initial values
                sendFreq(0.5);
                sendTrams(0);

            } catch (e) {
                log(`Error: ${e.message}`, 'error');
                if (e.stack) log(e.stack, 'error');
                statusDiv.textContent = `Error: ${e.message}`;
                statusDiv.className = 'status-error';
            }
        });

        // Send frequency control (vsl 0-1)
        function sendFreq(value) {
            sendMsg('n_0_29', '0', [value]);
            log(`Freq control: ${value.toFixed(2)}`);
        }

        // Send tram count (floatatom 0-5)
        function sendTrams(value) {
            sendMsg('n_0_32', '0', [value]);
            log(`Trams nearby: ${value}`);
        }

        freqSlider.addEventListener('input', (e) => {
            const value = parseFloat(e.target.value);
            freqValue.textContent = value.toFixed(2);
            sendFreq(value);
        });

        tramSlider.addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            tramValue.textContent = value;
            sendTrams(value);
        });

        log('UI ready. Click "Initialize Audio" to begin.');
    </script>
</body>
</html>
