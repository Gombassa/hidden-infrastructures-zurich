<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPd Test - Feeder Event</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d4ff; }
        .controls {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { background: #00a8cc; }
        button:disabled { background: #555; cursor: not-allowed; }
        label {
            display: block;
            margin: 15px 0 5px;
        }
        input[type="range"] {
            width: 100%;
        }
        .value {
            color: #00d4ff;
            font-weight: bold;
        }
        #console {
            background: #0f0f23;
            border: 1px solid #333;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            border-radius: 4px;
        }
        .log { color: #aaa; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
        .warn { color: #ffd43b; }
        #status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .status-loading { background: #ffd43b22; border: 1px solid #ffd43b; }
        .status-ready { background: #51cf6622; border: 1px solid #51cf66; }
        .status-error { background: #ff6b6b22; border: 1px solid #ff6b6b; }
    </style>
</head>
<body>
    <h1>WebPd Test: Feeder Event</h1>

    <div id="status" class="status-loading">Loading WebPd runtime...</div>

    <div class="controls">
        <button id="initBtn" disabled>Initialize Audio</button>
        <button id="playBtn" disabled>Play Sound (Bang)</button>

        <label>Pitch: <span id="pitchValue" class="value">800</span> Hz</label>
        <input type="range" id="pitchSlider" min="600" max="1200" value="800" step="10">

        <label>Direct frequency input:</label>
        <input type="number" id="pitchNumber" min="600" max="1200" value="800" style="width: 100px; padding: 5px;">
    </div>

    <h3>Console Output</h3>
    <div id="console"></div>

    <!-- WebPd runtime generated by: npx webpd -i feeder-event.pd -o feeder-event-app -f app -->
    <script src="feeder-event-app/webpd-runtime.js"></script>
    <script>
        // Console logging helper
        const consoleDiv = document.getElementById('console');
        function log(msg, type = 'log') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console[type === 'error' ? 'error' : type === 'warn' ? 'warn' : 'log'](msg);
        }

        const statusDiv = document.getElementById('status');
        const initBtn = document.getElementById('initBtn');
        const playBtn = document.getElementById('playBtn');
        const pitchSlider = document.getElementById('pitchSlider');
        const pitchNumber = document.getElementById('pitchNumber');
        const pitchValue = document.getElementById('pitchValue');

        let webpdNode = null;
        let audioContext = null;
        let patch = null;

        // Check that WebPdRuntime loaded
        if (typeof WebPdRuntime !== 'undefined') {
            log('WebPdRuntime loaded', 'success');
            initBtn.disabled = false;
            statusDiv.textContent = 'Click "Initialize Audio" to start';
            statusDiv.className = 'status-ready';
        } else {
            log('WebPdRuntime failed to load', 'error');
            statusDiv.textContent = 'WebPd runtime failed to load';
            statusDiv.className = 'status-error';
        }

        // Send message to a Pd node
        // Node IDs from compiled patch metadata:
        //   n_0_0 = bng (bang button)
        //   n_0_2 = floatatom (pitch, label "pitch")
        //   n_0_7 = msg (envelope: 1 5, 0.3 100 5, 0 200 105)
        //   n_0_3 = send (bus "event-pitch")
        function sendMsgToWebPd(nodeId, portletId, message) {
            if (!webpdNode) return;
            webpdNode.port.postMessage({
                type: 'io:messageReceiver',
                payload: { nodeId, portletId, message },
            });
        }

        // Initialize audio context and WebPd
        initBtn.addEventListener('click', async () => {
            try {
                log('Creating AudioContext...');
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                log(`AudioContext: ${audioContext.sampleRate}Hz, state: ${audioContext.state}`, 'success');

                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                    log('AudioContext resumed', 'success');
                }

                // Register the WebPd AudioWorklet
                log('Registering WebPd worklet...');
                await WebPdRuntime.initialize(audioContext);
                log('Worklet registered', 'success');

                // Fetch the compiled WASM patch
                log('Fetching compiled patch (patch.wasm)...');
                const response = await fetch('./feeder-event-app/patch.wasm');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                patch = await response.arrayBuffer();
                log(`Patch loaded (${patch.byteLength} bytes)`, 'success');

                // Run the patch
                log('Starting WebPd...');
                webpdNode = await WebPdRuntime.run(
                    audioContext,
                    patch,
                    WebPdRuntime.defaultSettingsForRun(
                        './feeder-event-app/patch.wasm',
                        (nodeId, portletId, message) => {
                            log(`Pd -> JS: ${nodeId}:${portletId} = ${JSON.stringify(message)}`);
                        },
                    ),
                );
                webpdNode.connect(audioContext.destination);

                log('WebPd running!', 'success');
                initBtn.disabled = true;
                playBtn.disabled = false;
                statusDiv.textContent = 'Ready to play!';
                statusDiv.className = 'status-ready';

                // Set initial pitch
                sendPitch(800);

            } catch (e) {
                log(`Error: ${e.message}`, 'error');
                if (e.stack) log(e.stack, 'error');
                statusDiv.textContent = `Error: ${e.message}`;
                statusDiv.className = 'status-error';
            }
        });

        // Send pitch value to the floatatom node
        function sendPitch(value) {
            sendMsgToWebPd('n_0_2', '0', [value]);
            log(`Pitch set to ${value} Hz`);
        }

        // Trigger bang
        function triggerBang() {
            sendMsgToWebPd('n_0_0', '0', ['bang']);
            log('Bang triggered!');
        }

        playBtn.addEventListener('click', triggerBang);

        pitchSlider.addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            pitchValue.textContent = value;
            pitchNumber.value = value;
            sendPitch(value);
        });

        pitchNumber.addEventListener('change', (e) => {
            let value = parseInt(e.target.value);
            value = Math.max(600, Math.min(1200, value));
            pitchValue.textContent = value;
            pitchSlider.value = value;
            pitchNumber.value = value;
            sendPitch(value);
        });

        log('UI ready. Click "Initialize Audio" to begin.');
    </script>
</body>
</html>
